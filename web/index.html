<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Casablanca Météo • Live</title>
    <meta name="description" content="Météo en direct à Casablanca (Event Hubs → Functions → SignalR)." />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.14/signalr.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>

  <body>
    <div class="sky-bg"></div>

    <main class="weather-app">

      <!-- ── HERO ── -->
      <section class="hero">
        <div class="hero__location">
          <span class="hero__pin">📍</span>
          <span id="heroCity">Casablanca</span>
        </div>
        <div id="heroTemp" class="hero__temp">—</div>
        <div id="heroDesc" class="hero__desc">—</div>
        <div id="heroFeelsLike" class="hero__feels">Ressenti : —</div>
        <div id="heroHighLow" class="hero__highlow">↑ — &nbsp; ↓ —</div>

        <div class="hero__status-row">
          <div class="pill pill--live"><span class="dot"></span>LIVE</div>
          <div id="status" class="status status--disconnected">Déconnecté</div>
          <span id="lastUpdateHuman" class="muted small">—</span>
          <span id="lastUpdate" class="hidden">—</span>
        </div>
      </section>

      <!-- ── HOURLY FORECAST ── -->
      <section class="card" id="hourlyCard">
        <p id="forecastDesc" class="forecast-desc">—</p>
        <div class="card-divider"></div>
        <div class="hourly-scroll">
          <div id="hourlyRow" class="hourly-row"></div>
        </div>
      </section>

      <!-- ── 7-DAY FORECAST ── -->
      <section class="card" id="dailyCard">
        <div class="card-section-title">📅 PRÉVISIONS SUR 7 JOURS</div>
        <div class="card-divider"></div>
        <div id="dailyList" class="daily-list"></div>
      </section>

      <!-- ── DETAILS ── -->
      <div class="details-grid">
        <div class="detail-card">
          <div class="detail-title">💧 HUMIDITÉ</div>
          <div id="humidity" class="detail-value">—</div>
          <div class="detail-unit">%</div>
        </div>
        <div class="detail-card">
          <div class="detail-title">💨 VENT</div>
          <div id="wind" class="detail-value">—</div>
          <div class="detail-unit">km/h</div>
        </div>
        <div class="detail-card">
          <div class="detail-title">🌧️ PRÉCIP.</div>
          <div id="precip" class="detail-value">—</div>
          <div id="precipPct" class="detail-unit">—</div>
        </div>
        <div class="detail-card">
          <div class="detail-title">🔵 PRESSION</div>
          <div id="pressure" class="detail-value">—</div>
          <div class="detail-unit">hPa</div>
        </div>
      </div>

      <!-- ── ACTIVITY LOG ── -->
      <section class="card log-section">
        <div class="log-header">
          <div>
            <span class="card-section-title" style="display:inline-block;padding:0">⚡ ACTIVITÉ</span>
            <span class="muted small" style="margin-left:8px">
              Source: <span id="source">—</span> · Schema: <span id="schema" class="mono">—</span>
            </span>
          </div>
          <div class="log-actions">
            <button id="toggleLogs" class="btn btn--ghost" type="button">Afficher</button>
            <button id="clear" class="btn" type="button">Effacer</button>
          </div>
        </div>
        <pre id="log" class="log" style="display:none"></pre>
      </section>

      <footer class="footer muted small">
        <span>Azure Static Website · Event Hubs → Functions → SignalR</span>
        <span class="dotsep">·</span>
        <span id="buildInfo" class="mono"></span>
      </footer>

    </main>
  </body>
</html>
